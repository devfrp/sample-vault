name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build

      - name: Package release assets
        run: |
          cd dist
          zip -r ../sample-vault.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## SampleVault ${{ github.ref_name }}

            Offline-first audio sample manager — React + Tailwind + WaveSurfer.js.

            ### Assets
            - `sample-vault.zip` — static build ready to deploy (GitHub Pages, Netlify, etc.)
          files: sample-vault.zip
          generate_release_notes: true
